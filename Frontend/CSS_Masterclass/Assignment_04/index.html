<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fashion Assignment</title>

    <!-- CSS -->
    <link rel="stylesheet" href="./style.css" />

    <!-- Remix Icon -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <!-- Google Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@100;200;300;400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
  </head>

  <body>

    <!-- ================= NAVBAR ================= -->

    <nav>

      <img
        src="./assets/images/logo-removebg-preview.png"
        alt="logo"
        class="logo"
      />

      <div class="anchor">
        <a href="#">New Arrivals</a>
        <a href="#">Shop</a>
        <a href="#">Beauty</a>
        <a href="#">Sale</a>
        <a href="#">Journal</a>
      </div>

      <div class="icons">

        <img
          src="./assets/images/nav search.png"
          alt="search"
        />

        <img
          src="./assets/images/8 nav.png"
          alt="profile"
        />

        <img
          src="./assets/images/cart.png"
          alt="cart"
        />

      </div>

    </nav>

    <div class="hr">
      <hr />
    </div>

    <!-- ================= MAIN ================= -->

    <main>

      <!-- LEFT SECTION -->

      <div class="leftdiv">

        <img
          src="./assets/images/sunflower1.png"
          alt="sunflower"
          class="sunf"
        />

        <p>Summer Collection</p>

        <h1>
          TRENDY AND <br />
          CLASSY FOR <br />
          NEW SEASON
        </h1>

        <img
          class="s1"
          src="./assets/images/s1-removebg-preview.png"
          alt="fashion"
        />

      </div>

      <!-- MIDDLE SECTION -->

      <div class="middiv">

        <h1>
          Make Your Fashion Look <br />
          More Charming
        </h1>

        <img
          src="./assets/images/daisy.png"
          alt="flower"
          class="daisy"
        />

        <div class="grid">

          <!-- LEFT STACK -->

          <div class="leftstack">

            <img
              class="s2"
              src="./assets/images/s7-removebg-preview.png"
              alt="model"
            />

            <img
              class="s3"
              src="./assets/images/s2-removebg-preview (1).png"
              alt="model"
            />

          </div>

          <!-- MIDDLE STACK -->

          <div class="midstack">

            <img
              src="./assets/images/star.png"
              alt="star"
              class="star"
            />

            <img
              class="s4"
              src="./assets/images/s3-removebg-preview (1).png"
              alt="model"
            />

          </div>

          <!-- RIGHT STACK -->

          <div class="rightstack">

            <img
              class="s5"
              src="./assets/images/s4-removebg-preview (1).png"
              alt="model"
            />

            <img
              class="s6"
              src="./assets/images/s5-removebg-preview.png"
              alt="model"
            />

          </div>

        </div>

      </div>

      <!-- RIGHT SECTION -->

      <div class="rightdiv">

        <img
          src="./assets/images/pink.png"
          alt="flower"
          class="pink"
        />

        <div class="leftpart">

          <img
            src="./assets/images/round_logo.png"
            alt="explore"
            class="explore"
          />

          <img
            src="./assets/images/s6-removebg-preview.png"
            alt="fashion"
            class="s7"
          />

        </div>

        <div class="p">
          <p>#2022</p>
        </div>

      </div>

    </main>

    <!-- ================= FOOTER ================= -->

    <footer>

      <div class="left">

        <i class="ri-double-quotes-l"></i>

        <p>
          I'm very much of the
          'buy less but buy better'
          philosophy. It's what I've
          never really knew
        </p>

        <img
          src="./assets/images/sign-removebg-preview.png"
          alt="sign"
          class="sign"
        />

      </div>

      <div class="mid">

        <img
          src="./assets/images/pink2.png"
          alt="flower"
        />

        <div class="scroll">

          <p>
            Scroll Down
            <i class="ri-arrow-drop-down-line"></i>
          </p>

        </div>

      </div>

      <div class="right">

        <p>01</p>

        <div class="blog">

          <p>31 May 2022 . Blog</p>

          <p class="quote">
            Always be strong <br />
            and have values
          </p>

        </div>

        <img
          src="./assets/images/rose-removebg-preview.png"
          alt="rose"
          class="rose"
        />

        <i class="ri-arrow-right-circle-fill"></i>

      </div>

    </footer>

  </body>
</html>
